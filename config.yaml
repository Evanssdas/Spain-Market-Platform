project:
  name: Spain Power Market Platform
  timezone: Europe/Madrid
  data_start: '2023-01-01'
  random_seed: 42
  forecast_issue_cutoff_local: '11:30'
paths:
  raw_dir: data/raw
  processed_dir: data/processed
  models_dir: models
  reports_dir: reports
  logs_dir: logs
sources:
  omie:
    download_url: https://www.omie.es/en/file-download
    parent: marginalpdbc
    timeout_seconds: 30
    retry_attempts: 4
    delay_seconds: 0.15
  redata:
    base_url: https://apidatos.ree.es/es/datos
    category: balance
    widget: balance-electrico
    geo_trunc: electric_system
    geo_limit: peninsular
    geo_ids: 8741
    time_trunc: day
    chunk_days: 31
    timeout_seconds: 45
    retry_attempts: 4
  open_meteo:
    forecast_url: https://api.open-meteo.com/v1/forecast
    historical_forecast_url: https://historical-forecast-api.open-meteo.com/v1/forecast
    timezone: Europe/Madrid
    chunk_days: 180
    timeout_seconds: 45
    retry_attempts: 4
    hourly_variables:
    - temperature_2m
    - cloud_cover
    - precipitation
    - shortwave_radiation
    - direct_normal_irradiance
    - wind_speed_100m
    - wind_direction_100m
