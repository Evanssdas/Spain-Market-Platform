models:
  holdout_fraction: 0.15
  time_series_splits: 5
  minimum_training_rows: 180
  component_targets:
    demand: target_demand_mwh
    wind: target_wind_mwh
    solar: target_solar_mwh
    nuclear: target_nuclear_mwh
    hydro: target_hydro_mwh
  price_target: target_price_peak_eur_mwh
  lightgbm:
    n_estimators: 450
    learning_rate: 0.035
    num_leaves: 24
    max_depth: -1
    min_child_samples: 20
    subsample: 0.9
    colsample_bytree: 0.9
    reg_alpha: 0.1
    reg_lambda: 0.3
    verbosity: -1
risk:
  paper_position_mwh: 100.0
  paper_capital_eur: 500000.0
  var_confidence_95_z: 1.6448536269514722
  var_confidence_99_z: 2.3263478740408408
  var_appetite_fraction: 0.02
  maximum_position_mwh: 2000.0
  volatility_window_days: 30
  stress_shocks_eur_mwh:
  - -100
  - -50
  - 50
  - 100
  - 200
