name: Daily Spain Grading

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"

permissions:
  contents: write

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install -e .
      - name: Check bootstrap
        run: |
          test -f data/processed/system_daily.parquet || {
            echo "Bootstrap required: collect history locally first."
            exit 1
          }
      - run: python -m spain_power daily-grade
      - name: Commit outputs
        run: |
          git config user.name "spain-power-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/processed reports logs
          git diff --cached --quiet || git commit -m "Spain grading $(date -u +%F)"
          git push
