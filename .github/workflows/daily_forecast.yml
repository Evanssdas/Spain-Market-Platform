name: Daily Spain Forecast

on:
  workflow_dispatch:
  schedule:
    # 09:15 UTC = 10:15 CET / 11:15 CEST.
    - cron: "15 9 * * *"

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install -e .
      - name: Check bootstrap
        run: |
          test -f models/spain_power_bundle.joblib || {
            echo "Bootstrap required: collect history and train locally first."
            exit 1
          }
      - run: python -m spain_power daily-forecast
      - name: Commit outputs
        run: |
          git config user.name "spain-power-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/processed models reports logs
          git diff --cached --quiet || git commit -m "Spain daily forecast $(date -u +%F)"
          git push
